name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      CI: "true"
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Create L2CS virtualenv
        run: |
          python -m venv .venv-l2cs
          .\.venv-l2cs\Scripts\python.exe -m pip install -U pip setuptools wheel
          .\.venv-l2cs\Scripts\python.exe -m pip install -r src-tauri/sidecars/requirements-l2cs.txt

      - name: Build bundled L2CS sidecar
        run: .\.venv-l2cs\Scripts\python.exe scripts/build_l2cs_sidecar.py

      - name: Verify sidecar output
        run: |
          $sidecar = "src-tauri/binaries/floworflop-l2cs-sidecar-x86_64-pc-windows-msvc.exe"
          if (!(Test-Path $sidecar)) {
            throw "Expected Windows sidecar was not generated: $sidecar"
          }

      - name: Run tests
        run: pnpm test

      - name: Build Windows installer
        run: pnpm tauri build --bundles nsis

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: floworflop-windows-bundle
          path: |
            src-tauri/target/release/bundle/nsis/**
            src-tauri/binaries/floworflop-l2cs-sidecar-x86_64-pc-windows-msvc.exe
          if-no-files-found: error
          retention-days: 14
